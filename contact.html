<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Adrian Diaz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #B8860B;
            --gold-bright: #D4AF37;
            --white: #FFFFFF;
            --text-main: #1A1A1A;
            --text-muted: #555;
            --bg-light: #fdfdfd;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow: hidden;
        }

        /* HOME BUBBLE */
        .home-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            width: 65px;
            height: 65px;
            background: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(184, 134, 11, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatBubble 3s ease-in-out infinite;
        }

        .home-bubble:hover {
            transform: scale(1.2) rotate(10deg);
            background: var(--text-main);
        }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* MAIN CONTAINER - RE-DISTRIBUTED */
        .container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            grid-template-rows: auto auto 1fr;
            height: 100vh;
            width: 100vw;
            background: white;
            position: relative;
        }

        /* PULSE LINE EFFECT */
        .container::after {
            content: "";
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
            opacity: 0.2;
            z-index: 0;
            animation: pulseLine 4s infinite;
        }

        @keyframes pulseLine {
            0%, 100% { width: 60%; opacity: 0.1; }
            50% { width: 90%; opacity: 0.4; }
        }

        .header-profile {
            grid-column: 1 / span 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0 20px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .header-profile h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            color: var(--gold);
        }

        nav {
            grid-column: 1 / span 2;
            text-align: center;
            padding: 15px 0;
            background: white;
            border-bottom: 1px solid #eee;
        }

        nav a {
            text-decoration: none;
            color: var(--gold);
            font-weight: 700;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        nav a:hover, .active {
            color: var(--text-main);
            border-bottom: 2px solid var(--text-main);
        }

        /* CONTENT AREAS */
        .content-left, .content-right {
            padding: 20px 60px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            z-index: 1;
            perspective: 1200px;
        }

        .content-left { border-right: 1px solid #eee; }
        .content-right { background: #fafafa; }

        /* 3D INDEPENDENT CONTACT CARD */
        .contact-card {
            background: #fff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .contact-card:hover {
            box-shadow: 0 25px 60px rgba(184, 134, 11, 0.2);
            border-color: var(--gold-bright);
        }

        .contact-card strong {
            display: block;
            color: var(--gold);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            transform: translateZ(30px);
        }

        .contact-card h3 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.3rem;
            transform: translateZ(50px);
        }

        .btn-action {
            margin-top: 25px;
            color: var(--gold);
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 1.5px solid var(--gold);
            padding: 14px 30px;
            border-radius: 50px;
            transition: 0.3s;
            transform: translateZ(60px);
            text-decoration: none;
        }

        .contact-card:hover .btn-action {
            background-color: var(--gold);
            color: white;
            transform: translateZ(70px) scale(1.1);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; grid-template-rows: auto auto auto auto; height: auto; }
            .content-left { border-right: none; }
            .contact-card { transform: none !important; margin-bottom: 20px; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-bubble">HOME</a>

    <div class="container">
        <header class="header-profile">
            <h1>Get In Touch</h1>
        </header>

        <nav>
            <a href="philosophy.html">Philosophy</a>
            <a href="clinical.html">Clinical</a>
            <a href="credentials.html">Credentials</a>
            <a href="development.html">Development</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>

        <main class="content-left">
            <div class="contact-card tilt-card">
                <strong>Location</strong>
                <h3>Miami Springs, Florida</h3>
            </div>
        </main>

        <aside class="content-right">
            <a href="mailto:adriandn2022@gmail.com" class="contact-card tilt-card">
                <strong>Email Address</strong>
                <h3>adriandn2022@gmail.com</h3>
                <span class="btn-action">Email Me</span>
            </a>

            <a href="tel:7863023112" class="contact-card tilt-card">
                <strong>Phone Number</strong>
                <h3>(786) 218-7679</h3>
                <span class="btn-action">Call Me</span>
            </a>
        </aside>
    </div>

    <script>
        const cards = document.querySelectorAll('.tilt-card');

        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                if (window.innerWidth > 900) {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = (centerY - y) / 12;
                    const rotateY = (x - centerX) / 12;
                    
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.06)`;
                }
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
            });
        });
    </script>
</body>
</html>
