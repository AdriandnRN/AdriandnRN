<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrian Diaz | RN Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --paper: #fdfaf0;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        /* --- ESCENA INICIAL: CUADERNO EN LA MESA --- */
        .table-scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=2070&auto=format&fit=crop'); /* Imagen de mesa de madera profesional */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        /* --- EL CUADERNO (PADFOLIO) --- */
        .notebook {
            width: 400px;
            height: 550px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        /* PORTADA DE CUERO */
        .cover {
            position: absolute;
            width: 100%; height: 100%;
            background: #3d251e url('https://www.transparenttextures.com/patterns/leather.png');
            border-radius: 5px 15px 15px 5px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transform-origin: left;
            transition: transform 1.5s;
            border-left: 10px solid #2b1a15;
        }

        .cover h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            margin: 0;
            text-align: center;
        }

        .cover .badge {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* BOTÓN OPEN CON BEAT */
        .open-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            cursor: pointer;
            border-radius: 50px;
            position: relative;
        }

        .open-btn::after {
            content: '';
            position: absolute;
            inset: -5px;
            border: 2px solid var(--gold);
            border-radius: 50px;
            animation: beat 1.5s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* --- INTERIOR (PÁGINAS) --- */
        .pages {
            position: absolute;
            width: 200%; /* Para que al abrir ocupe el doble */
            height: 100%;
            background: var(--paper);
            left: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateX(-25%); /* Centra el cuaderno abierto */
            transition: opacity 0.5s;
        }

        /* PÁGINA IZQUIERDA: Perfil */
        .page-left {
            padding: 40px;
            border-right: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 20px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        /* PÁGINA DERECHA: Navegación */
        .page-right {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }

        .nav-link {
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
            text-decoration: none;
            color: #333;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: #3d251e;
            color: white;
        }

        /* ESTADO ABIERTO */
        .is-open .cover {
            transform: rotateY(-160deg);
        }
        .is-open .pages {
            opacity: 1;
            z-index: 1;
        }

        @media (max-width: 800px) {
            .notebook { width: 300px; height: 450px; }
            .pages { grid-template-columns: 1fr; width: 100%; transform: none; overflow-y: auto; }
            .is-open .cover { display: none; } /* En móvil mejor ocultar la tapa */
        }
    </style>
</head>
<body>

    <div class="table-scene">
        <div class="notebook" id="myNotebook">
            
            <div class="cover">
                <h1>Adrian Diaz</h1>
                <div class="badge">RN PORTFOLIO</div>
                <button class="open-btn" onclick="openBook(event)">OPEN</button>
            </div>

            <div class="pages">
                <div class="page-left">
                    <img src="TU_FOTO_AQUI.jpg" alt="Adrian Diaz" class="profile-pic">
                    <h2 style="font-family: 'Cinzel'; margin: 0;">Adrian Diaz</h2>
                    <p style="color: var(--gold); font-weight: bold; margin-bottom: 20px;">Registered Nurse</p>
                    <p style="font-size: 0.9rem; line-height: 1.6; color: #444;">
                        Enfermero graduado con pasión por la seguridad clínica y el cuidado humano. 
                        Especializado en administración de medicamentos y manejo de pacientes críticos.
                    </p>
                </div>
                <div class="page-right">
                    <a href="index.html" class="nav-link">Overview</a>
                    <a href="philosophy.html" class="nav-link">Philosophy</a>
                    <a href="clinical.html" class="nav-link">Clinical</a>
                    <a href="credentials.html" class="nav-link">Credentials</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function openBook(e) {
            e.stopPropagation();
            document.getElementById('myNotebook').classList.add('is-open');
        }
    </script>

</body>
</html>
