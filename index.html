<!DOCTYPE html>
<html lang="es">

    <style>
        /* Estilos de Color Oro y Diamante */
        :root {
            --gold: #D4AF37;
            --gold-light: #F9E29C;
            --diamond: #E5E4E2;
            --dark-bg: #0A0A0A;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--diamond);
            margin: 0;
            line-height: 1.6;
            text-align: center;
        }

        /* Menú Interactivo */
        nav {
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--gold);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--white);
            text-shadow: 0 0 10px var(--diamond), 0 0 20px var(--gold);
        }
