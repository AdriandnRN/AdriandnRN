<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrian Diaz | RN Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --white: #FFFFFF;
            --light-gray: #FAFAFA;
            --text: #2C2C2C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--white); color: var(--text); scroll-behavior: smooth; }

        /* --- PÁGINA DE INICIO (PORTADA) --- */
        #landing-page {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2000;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .cover-content { text-align: center; animation: fadeIn 1.5s ease; }
        
        .profile-circle {
            width: 180px; height: 180px; border-radius: 50%;
            border: 3px solid var(--gold); padding: 5px; margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        .profile-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #eee; }

        .cover-content h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--gold); margin-bottom: 5px; letter-spacing: -1px; }
        .cover-content .tagline { font-size: 1rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text); opacity: 0.7; margin-bottom: 40px; }

        .enter-btn {
            padding: 15px 40px; background: var(--white); color: var(--gold);
            border: 2px solid var(--gold); font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s;
        }
        .enter-btn:hover { background: var(--gold); color: var(--white); }

        /* --- PÁGINA DE CONTENIDO (ESTILO ANDY) --- */
        #main-portfolio { display: none; opacity: 0; transition: opacity 1s; }

        /* Navigation Menu */
        nav {
            background: var(--white); border-bottom: 1px solid #eee;
            padding: 20px 0; position: sticky; top: 0; z-index: 1000;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; display: flex; justify-content: center; gap: 30px;
        }
        .nav-container a {
            text-decoration: none; color: var(--text); font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s;
        }
        .nav-container a:hover { color: var(--gold); }

        /* Header Section */
        .header-content { text-align: center; padding: 60px 20px; border-bottom: 1px solid #f0f0f0; }
        .header-content h2 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--text); margin-bottom: 10px; }
        .header-content .subtitle { color: var(--gold); font-weight: 600; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        .badge { background: #f9f9f9; border: 1px solid #eee; padding: 5px 15px; font-size: 0.7rem; font-weight: 600; color: #666; }

        .action-btns { margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        .btn-action {
            padding: 10px 25px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: 600; transition: 0.3s;
        }
        .btn-gold { background: var(--gold); color: white; border: 1px solid var(--gold); }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid #ddd; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Main Content Grid */
        .content-body { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        
        .info-block { margin-bottom: 60px; }
        .info-block h3 { 
            font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); 
            margin-bottom: 25px; border-bottom: 2px solid var(--gold); display: inline-block;
        }
        .info-block p { line-height: 1.8; color: #444; margin-bottom: 20px; }

        /* Credentials List */
        .credential-link {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: #fafafa; border: 1px solid #eee; border-radius: 4px;
            text-decoration: none; color: var(--text); margin-bottom: 10px; transition: 0.3s;
        }
        .credential-link:hover { border-color: var(--gold); background: #fff; transform: translateX(5px); }
        .credential-link i { color: var(--gold); }

        footer { text-align: center; padding: 40px; border-top: 1px solid #eee; font-size: 0.8rem; color: #999; }

        /* --- ANIMACIONES --- */
        .hide-landing { transform: translateY(-100%) !important; }
        .show-portfolio { display: block !important; opacity: 1 !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            .nav-container { flex-wrap: wrap; gap: 10px; }
            .header-content h2 { font-size: 2rem; }
            .cover-content h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
