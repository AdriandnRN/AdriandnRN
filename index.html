<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrian Diaz | Professional RN Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #B8860B;
            --gold-bright: #D4AF37;
            --white: #FFFFFF;
            --text-main: #1A1A1A;
            --text-muted: #555;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4; /* Clean solid background */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* 3D MAIN CONTAINER */
        .main-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            width: 90%;
            max-width: 1100px;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* LEFT SIDE: Identity & Profile */
        .left-side {
            padding: 60px;
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* PROFILE IMAGE FROM REPOSITORY */
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin-bottom: 30px;
            border: 4px solid var(--white);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            object-fit: cover;
            display: block;
        }

        .left-side h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .left-side .role {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 25px;
            display: block;
        }

        .left-side p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-muted);
            max-width: 420px;
        }

        /* RIGHT SIDE: Navigation (Home Removed) */
        .right-side {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            background: rgba(184, 134, 11, 0.02);
        }

        .nav-button {
            text-decoration: none;
            background: var(--white);
            color: var(--text-main);
            padding: 22px 30px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            transform: translateZ(20px);
            border: 1px solid rgba(184, 134, 11, 0.1);
        }

        .nav-button:hover {
            transform: translateZ(50px) scale(1.05);
            background: var(--gold);
            color: var(--white);
            box-shadow: 0 20px 40px rgba(184, 134, 11, 0.25);
            border-color: var(--gold-bright);
        }

        .nav-button span { font-size: 1.2rem; }

        @media (max-width: 950px) {
            .main-container { grid-template-columns: 1fr; height: 95vh; overflow-y: auto; }
            .left-side, .right-side { padding: 40px; }
            .left-side h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="main-container" id="card">
        <div class="left-side">
            <img src="profile.jpg" alt="Adrian Diaz" class="profile-img">
            
            <h1>Adrian Diaz</h1>
            <span class="role">Registered Nurse | Industrial Engineer</span>
            <p>
                Bridging clinical expertise with industrial engineering precision to drive <strong>workflow optimization and patient advocacy</strong> in modern healthcare environments.
            </p>
        </div>

        <div class="right-side">
            <a href="philosophy.html" class="nav-button">Philosophy <span>→</span></a>
            <a href="clinical.html" class="nav-button">Clinical <span>→</span></a>
            <a href="credentials.html" class="nav-button">Credentials <span>→</span></a>
            <a href="contact.html" class="nav-button">Contact <span>→</span></a>
        </div>
    </div>

    <script>
        // 3D Tilt Effect
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
