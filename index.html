<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrian Diaz | RN Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --paper: #fdfaf0;
            --leather: #3d251e;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        /* ESCENA DE LA MESA */
        .table-scene {
            width: 100vw;
            height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2500px; /* Perspectiva profunda para efecto distante */
        }

        /* ESTRUCTURA DEL CUADERNO */
        .notebook {
            width: 450px;
            height: 580px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(15deg) rotateY(-5deg); /* Inclinación tipo Pinterest */
            transition: transform 1.5s ease;
        }

        /* TAPA (COVER) */
        .cover {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--leather) url('https://www.transparenttextures.com/patterns/leather.png');
            border-radius: 5px 15px 15px 5px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.6);
            z-index: 10;
            transform-origin: left; /* Punto de giro de la bisagra */
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            border-left: 12px solid #2b1a15;
        }

        .cover h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        /* BOTÓN OPEN INTERACTIVO */
        .open-btn {
            margin-top: 40px;
            padding: 15px 45px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50px;
            position: relative;
            transition: all 0.3s ease;
        }

        .open-btn:hover {
            background: var(--gold);
            color: white;
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.05);
        }

        .open-btn::after {
            content: '';
            position: absolute;
            inset: -6px;
            border: 2px solid var(--gold);
            border-radius: 50px;
            animation: beat 1.5s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* PÁGINAS INTERIORES */
        .pages {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--paper);
            display: grid;
            grid-template-columns: 1fr 1fr;
            transform-style: preserve-3d;
            z-index: 5;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.3);
            border-radius: 0 5px 5px 0;
            width: 200%; /* El cuaderno se duplica al abrirse */
            left: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* PÁGINA IZQUIERDA */
        .page-left {
            padding: 50px;
            border-right: 2px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 50%;
            background: #eee;
            margin-bottom: 20px;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        /* PÁGINA DERECHA (BOTONES DINÁMICOS) */
        .page-right {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .nav-link {
            padding: 18px;
            background: white;
            border: 1px solid #e0e0e0;
            text-decoration: none;
            color: #333;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .nav-link:hover {
            background: var(--leather);
            color: white;
            transform: scale(1.05) translateX(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* ANIMACIÓN AL ABRIR */
        .is-open {
            transform: rotateX(0deg) rotateY(0deg) translateX(25%); /* Centra el cuaderno abierto */
        }
        .is-open .cover {
            transform: rotateY(-180deg); /* Abre la tapa totalmente */
        }
        .is-open .pages {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .notebook { width: 320px; height: 480px; }
            .pages { grid-template-columns: 1fr; width: 100%; transform: none; left: 0; }
            .is-open { transform: none; }
        }
    </style>
</head>
<body>

    <div class="table-scene">
        <div class="notebook" id="notebook">
            
            <div class="cover">
                <h1>Adrian Diaz</h1>
                <p style="color: var(--gold); font-family: 'Cinzel'; letter-spacing: 3px;">RN PORTFOLIO</p>
                <button class="open-btn" onclick="abrirCuaderno()">OPEN</button>
            </div>

            <div class="pages">
                <div class="page-left">
                    <img src="tu-foto.jpg" alt="Adrian Diaz" class="profile-img">
                    <h2 style="font-family: 'Cinzel'; margin-bottom: 5px;">Adrian Diaz</h2>
                    <p style="color: var(--gold); font-weight: bold; margin-top: 0;">Registered Nurse</p>
                    <p style="font-size: 0.95rem; line-height: 1.6; color: #555;">
                        Enfermero dedicado a la excelencia clínica y la seguridad del paciente. 
                        Enfoque en cuidados humanizados y optimización de procesos.
                    </p>
                </div>
                <div class="page-right">
                    <a href="index.html" class="nav-link">Overview</a>
                    <a href="philosophy.html" class="nav-link">Philosophy</a>
                    <a href="clinical.html" class="nav-link">Clinical</a>
                    <a href="credentials.html" class="nav-link">Credentials</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function abrirCuaderno() {
            const nb = document.getElementById('notebook');
            nb.classList.add('is-open');
        }
    </script>

</body>
</html>
