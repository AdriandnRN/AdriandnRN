<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials | Adrian Diaz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8860B;
            --text-dark: #2C2C2C;
            --diamond-bg: #FFFFFF;
            --soft-gray: #F9F9F9;
        }

        body {
            background-color: var(--diamond-bg) !important;
            color: var(--text-dark);
            font-family: 'Arial', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        nav {
            text-align: center;
            padding: 20px;
            border-bottom: 4px solid var(--gold);
            background-color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--gold);
            font-weight: bold;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        main {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            color: var(--gold);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        h2 {
            color: var(--gold);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-top: 40px;
        }

        /* Sección de Documentos Principales */
        .download-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .doc-card {
            background-color: var(--soft-gray);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #eee;
            text-align: center;
            transition: 0.3s;
