<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials | Adrian Diaz</title>

        body {
            background-color: #ffffff !important;
            color: #222222;

            margin: 0;

        nav {
            text-align: center;
            padding: 20px;
            border-bottom: 4px solid #D4AF37;
            background-color: #ffffff;
        }

        nav a {
            text-decoration: none;
            color: #D4AF37;
            font-weight: bold;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        main {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #D4AF37;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #222222;
            font-size: 1.5rem;
            margin-top: 50px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
        }

        /* Contenedor de Botones */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .btn-credential {
            display: block;
            width: 100%;
            max-width: 350px;
            padding: 18px;
            border: 2px solid #D4AF37;
            color: #D4AF37;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-credential:hover {
            background-color: #D4AF37;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
