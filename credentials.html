<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials | Adrian Diaz</title>
    <style>
        body {
            background-color: #FFFFFF !important;
            color: #222222 !important;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            text-align: center;
            padding: 20px;
            border-bottom: 4px solid #D4AF37;
            background-color: #FFFFFF;
        }
        nav a {
            text-decoration: none;
            color: #D4AF37;
            font-weight: bold;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1, h2 {
            color: #D4AF37;
            text-align: center;
        }

        /* Sección del Resume Incrustado */
        .resume-section {
            margin: 40px 0;
            border: 2px solid #D4AF37;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* El visor del PDF */
        .resume-viewer {
            width: 100%;
            height: 800px; /* Altura suficiente para leerlo bien */
            border: none;
        }

        .download-area {
            text-align: center;
            margin-bottom: 50px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #D4AF37;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin: 10px;
            transition: 0.3s;
        }
