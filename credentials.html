            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-credential:hover {
            background-color: #D4AF37;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
