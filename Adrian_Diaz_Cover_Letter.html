    <title>Cover Letter | Adrian Diaz</title>

        :root {
            --gold: #D4AF37;
            --text: #333;
        }

        body {
            background-color: #f4f4f4;

            font-family: 'Times New Roman', Times, serif;
            color: var(--text);
        }

        nav {
            text-align: center;
            padding: 20px;
            border-bottom: 4px solid var(--gold);
            background-color: #FFFFFF;
        }

        nav a {
            text-decoration: none;
            color: var(--gold);
            font-weight: bold;
            margin: 0 15px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
        }

        .letter-page {
            background-color: #FFFFFF;
            max-width: 850px;
            margin: 40px auto;
            padding: 60px 70px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);

        }

            margin-bottom: 30px;

        }

        .header h1 {

            color: var(--gold);
            font-family: Arial, sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .contact-line {
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .date { margin-bottom: 25px; }

        .recipient { margin-bottom: 25px; line-height: 1.4; }

        .subject {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-decoration: underline;
        }

            margin-bottom: 15px;
            text-align: justify;
            line-height: 1.5;
            font-size: 1.05rem;
        }

        .content ul {
            margin-bottom: 15px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .signature { margin-top: 40px; line-height: 1.4; }

        .actions { text-align: center; margin-bottom: 40px; }
